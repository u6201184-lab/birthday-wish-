<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Kinza</title>
<style>
body{
margin:0;
font-family:Arial;
background:#0b0b1a;
color:white;
overflow-x:hidden;
}

/* common */
.page{
display:none;
height:100vh;
width:100%;
text-align:center;
position:relative;
padding:20px;
}
.active{display:block;}

/* title */
h1{
color:#ff4da6;
font-size:40px;
margin-top:20px;
}

/* buttons */
button{
padding:10px 20px;
border:none;
border-radius:10px;
background:#ff4da6;
color:white;
font-size:18px;
margin-top:10px;
cursor:pointer;
}

/* keypad */
.keypad{
display:grid;
grid-template-columns:repeat(3,60px);
gap:10px;
justify-content:center;
margin-top:20px;
}
.key{
background:#222;
padding:15px;
border-radius:10px;
cursor:pointer;
}

/* input boxes */
.boxes input{
width:40px;
height:40px;
text-align:center;
font-size:20px;
margin:5px;
}

/* cake */
.cake{
width:200px;
margin-top:20px;
}

/* confetti */
.confetti{
position:absolute;
width:8px;
height:8px;
background:pink;
animation:fall 3s infinite;
}
@keyframes fall{
0%{transform:translateY(-100px) rotate(0);}
100%{transform:translateY(100vh) rotate(360deg);}
}

/* balloons */
.balloon{
position:absolute;
width:30px;
height:40px;
border-radius:50%;
background:#ff4da6;
animation:float 5s infinite;
}
@keyframes float{
0%{bottom:-50px;}
100%{bottom:110%;}
}

/* bear */
.bear{
font-size:80px;
}

/* gift boxes */
.gift{
display:inline-block;
margin:20px;
padding:20px;
background:#1a1a2e;
border-radius:10px;
}

</style>
</head>
<body>

<!-- PAGE 1 -->
<div class="page active" id="page1">
<h1>Happy Birthday Kinza 🎉</h1>

<div style="display:flex;justify-content:space-around;align-items:center;">

<!-- image -->
<div>
<img src="blue-dress.jpg" width="250">
</div>

<!-- keypad -->
<div>
<div class="boxes">
<input maxlength="1"><input maxlength="1"><input maxlength="1">
<input maxlength="1"><input maxlength="1"><input maxlength="1">
</div>

<div class="keypad">
<div class="key">1</div><div class="key">2</div><div class="key">3</div>
<div class="key">4</div><div class="key">5</div><div class="key">6</div>
<div class="key">7</div><div class="key">8</div><div class="key">9</div>
</div>

<button onclick="goPage2()">Next</button>
</div>

</div>
</div>

<!-- PAGE 2 -->
<div class="page" id="page2">
<h1>Make a Wish 🎂</h1>
<img class="cake" src="cake.png">

<br>
<button onclick="blow()">Blow Candles</button>
<button onclick="goPage3()">Next</button>
</div>

<!-- PAGE 3 -->
<div class="page" id="page3">
<h1>It's a Surprise 🎁</h1>
<button onclick="yes()">YES</button>
<button onclick="no()">NO</button>
</div>

<!-- PAGE 4 NO -->
<div class="page" id="noPage">
<div class="bear">🐻🔨</div>
<h2>Go Back 😡</h2>
</div>

<!-- PAGE 5 YES -->
<div class="page" id="yesPage">

<h1>Choose Gift 🎁</h1>

<div class="gift">
<img src="blue-dress.jpg" width="150"><br>
<p>Photos Gift</p>
</div>

<div class="gift">
<p>A Special Message:</p>
<p>
Allah tumhari zindagi me bohat khushiyan de.<br>
Tum hamesha khush raho ❤️
</p>
</div>

<audio id="song" src="count-on-me.mp3" controls></audio>

</div>

<script>

function goPage2(){
document.getElementById("page1").classList.remove("active");
document.getElementById("page2").classList.add("active");
}

function goPage3(){
document.getElementById("page2").classList.remove("active");
document.getElementById("page3").classList.add("active");
}

function yes(){
document.getElementById("page3").classList.remove("active");
document.getElementById("yesPage").classList.add("active");
}

function no(){
document.getElementById("page3").classList.remove("active");
document.getElementById("noPage").classList.add("active");
}

function blow(){
alert("Candles blown 🎉");
createConfetti();
}

function createConfetti(){
for(let i=0;i<50;i++){
let c=document.createElement("div");
c.className="confetti";
c.style.left=Math.random()*100+"vw";
c.style.background=["pink","blue","purple","white"][Math.floor(Math.random()*4)];
document.body.appendChild(c);
setTimeout(()=>c.remove(),3000);
}
}

</script>

</body>
</html>
