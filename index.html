<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Kinza</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b1a;
color:white;
overflow-x:hidden;
}

/* pages */
.page{
display:none;
height:100vh;
width:100%;
text-align:center;
padding:20px;
box-sizing:border-box;
}
.active{display:block;}

/* title */
h1{
color:#ff4da6;
}

/* layout */
.container{
display:flex;
justify-content:space-around;
align-items:center;
height:80vh;
}

/* input */
.boxes input{
width:40px;
height:40px;
text-align:center;
font-size:20px;
margin:5px;
}

/* keypad */
.keypad{
display:grid;
grid-template-columns:repeat(3,60px);
gap:10px;
margin-top:20px;
}

.key{
background:#222;
padding:15px;
border-radius:10px;
cursor:pointer;
}

/* buttons */
button{
padding:10px 20px;
border:none;
border-radius:10px;
background:#ff4da6;
color:white;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

/* bear */
.bear{
font-size:100px;
}

/* cake */
.cake{
width:200px;
margin-top:20px;
}

/* gift */
.gift{
display:inline-block;
margin:20px;
padding:20px;
background:#1a1a2e;
border-radius:10px;
}
</style>
</head>

<body>

<!-- PAGE 1 -->
<div class="page active" id="page1">

<h1>Happy Birthday 🎉</h1>

<div class="container">

<!-- LEFT -->
<div>
<h3>Enter Password</h3>

<div class="boxes">
<input id="b1" maxlength="1">
<input id="b2" maxlength="1">
<input id="b3" maxlength="1">
<input id="b4" maxlength="1">
<input id="b5" maxlength="1">
<input id="b6" maxlength="1">
</div>

<div class="keypad">
<div class="key" onclick="add(1)">1</div>
<div class="key" onclick="add(2)">2</div>
<div class="key" onclick="add(3)">3</div>
<div class="key" onclick="add(4)">4</div>
<div class="key" onclick="add(5)">5</div>
<div class="key" onclick="add(6)">6</div>
<div class="key" onclick="add(7)">7</div>
<div class="key" onclick="add(8)">8</div>
<div class="key" onclick="add(9)">9</div>
<div class="key" onclick="add(0)">0</div>
</div>

<button onclick="check()">Next</button>
</div>

<!-- RIGHT -->
<div class="bear">🐻</div>

</div>
</div>

<!-- PAGE 2 -->
<div class="page" id="page2">
<h1>Make a Wish 🎂</h1>
<img class="cake" src="cake.png">
<br>
<button onclick="go3()">Next</button>
</div>

<!-- PAGE 3 -->
<div class="page" id="page3">
<h1>It's a Surprise 🎁</h1>
<button onclick="yes()">YES</button>
<button onclick="no()">NO</button>
</div>

<!-- NO PAGE -->
<div class="page" id="noPage">
<div class="bear">🐻🔨</div>
<h2>Go Back 😡</h2>
</div>

<!-- YES PAGE -->
<div class="page" id="yesPage">

<h1>Choose Gift 🎁</h1>

<div class="gift">
<img src="blue-dress.jpg" width="150">
<p>Photo Gift</p>
</div>

<div class="gift">
<p>💖 Special Message</p>
<p>
Allah tumhari zindagi me hamesha khushiyan de.<br>
Tum hamesha happy raho ❤️
</p>
</div>

<audio id="song" src="count-on-me.mp3" controls></audio>

</div>

<script>

let i = 1;

// keypad
function add(num){
if(i <= 6){
document.getElementById("b"+i).value = num;
i++;
}
}

// password check (FIXED)
function check(){

let pass =
document.getElementById("b1").value +
document.getElementById("b2").value +
document.getElementById("b3").value +
document.getElementById("b4").value +
document.getElementById("b5").value +
document.getElementById("b6").value;

if(pass === "162024"){
document.getElementById("page1").classList.remove("active");
document.getElementById("page2").classList.add("active");
}
else{
alert("Wrong Password ❌");
}
}

// navigation
function go3(){
document.getElementById("page2").classList.remove("active");
document.getElementById("page3").classList.add("active");
}

function yes(){
document.getElementById("page3").classList.remove("active");
document.getElementById("yesPage").classList.add("active");
}

function no(){
document.getElementById("page3").classList.remove("active");
document.getElementById("noPage").classList.add("active");
}

</script>

</body>
</html>
